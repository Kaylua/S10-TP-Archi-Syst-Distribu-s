spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: catalog-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/books/**

            - id: loan-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/loans/**

server:
  port: 8080
